[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autogkb-benchmark"
version = "0.1.0"
description = "AutoGKB benchmark evaluation"
requires-python = ">=3.11"
dependencies = [
    "autogkb-pipeline",
    "autogkb-shared",
    "scikit-learn>=1.3.0",
    "polars>=1.37.0",
    "datasets>=3.6.0",
    "seaborn>=0.13.0",
    "numpy>=2.2.0",
    "termcolor>=3.1.0",
    "sentence-transformers>=3.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["benchmark"]
