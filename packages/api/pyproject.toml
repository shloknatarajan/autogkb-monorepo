[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autogkb-api"
version = "1.0.0"
description = "AutoGKB FastAPI backend"
requires-python = ">=3.11"
dependencies = [
    "autogkb-pipeline",
    "autogkb-shared",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "psycopg2-binary>=2.9.0",
    "python-multipart>=0.0.6",
]

[tool.uv.sources]
autogkb-pipeline = { workspace = true }
autogkb-shared = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src"]
